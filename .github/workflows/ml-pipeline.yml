name: ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mlops-demo

jobs:
  # ── Job 1: Data validation + unit tests ──────────────────────────────────
  test:
    name: Data Validation & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: 02_cicd
        run: pip install -r requirements.txt

      - name: Run data schema tests
        working-directory: 02_cicd
        run: pytest tests/test_data_schema.py -v

      - name: Run predict API tests
        working-directory: 02_cicd
        run: pytest tests/test_predict_api.py -v

  # ── Job 2: Train model + quality gate ────────────────────────────────────
  train-and-validate:
    name: Train & Quality Gate
    runs-on: ubuntu-latest
    needs: test          # only runs if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: 02_cicd
        run: pip install -r requirements.txt

      - name: Train model
        working-directory: 02_cicd
        run: python src/train.py --n_estimators 100 --max_depth 5

      - name: Run model quality gate
        working-directory: 02_cicd
        run: pytest tests/test_model_quality.py -v
        # Pipeline STOPS here if accuracy < 0.85 or F1 < 0.85

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: 02_cicd/models/
          retention-days: 7

  # ── Job 3: Build & push Docker image ─────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: train-and-validate   # only runs if quality gate passes

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: 02_cicd
          push: ${{ github.ref == 'refs/heads/main' }}   # push only on main
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── Job 4: Deploy (stub) ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'   # only on main branch

    environment:
      name: staging

    steps:
      - name: Pull and run latest image
        run: |
          echo "Deploying image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          # Replace with your actual deployment command, e.g.:
          # ssh user@staging-server "docker pull $IMAGE && docker-compose up -d"
          # kubectl set image deployment/mlops-demo app=${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "Deployment stub complete."

      - name: Smoke test deployed service
        run: |
          echo "Running post-deploy smoke test..."
          # curl -f http://staging.internal/health || exit 1
          echo "Smoke test passed."
