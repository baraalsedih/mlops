stages:
  prepare:
    cmd: python src/prepare.py
    deps:
      - src/prepare.py
      - data/wine_raw.csv
    outs:
      - data/train.csv
      - data/test.csv
    params:
      - params.yaml:
          - prepare.test_size
          - prepare.random_state

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/train.csv
    outs:
      - models/model.pkl
    params:
      - params.yaml:
          - train.n_estimators
          - train.max_depth

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/model.pkl
      - data/test.csv
    metrics:
      - metrics/scores.json:
          cache: false
